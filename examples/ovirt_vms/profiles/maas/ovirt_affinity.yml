    cluster: ''
    vms_labels: maas-region-controller
    vm_rule: negative
    vm_enforcing: true
  - name: maas-rack-controller
    cluster: ''
    vms_labels: maas-rack-controller
    vm_rule: negative
    vm_enforcing: true
  - name: maas-db
    cluster: ''
    vms_labels: maas-db
    vm_rule: negative
    vm_enforcing: true
  - name: maas-proxy
    cluster: ''
    vms_labels: maas-proxy
    vm_rule: negative
    vm_enforcing: false
