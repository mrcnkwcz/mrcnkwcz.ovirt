---
ovirt_vm_profiles:
  cloudlink:
    count: 1
    cluster: ''
    template: ''
    clone: true
    cpu_sockets: 1
    cpu_cores: 16
    cpu_threads: 1
    memory_max: 128 GiB
    memory: 64 GiB
    memory_guaranteed: 64 GiB
    nics:
      - name: vnic1
        network: ''
    storage_domain: ''
    disk_format: raw
    disks:
      - name: os
        size: 512 GiB
        bootable: true
    high_availability: true
    high_availability_priority: 40
    lease: ''
    affinity_labels:
      - cloudlink-agent
      - cloudlink-server
      - cloudlink-lb
    tags:
      - cloudlink-agent
      - cloudlink-server
      - cloudlink-lb
    cloud_init_persist: true
    cloud_init:
      user_name: ''
      root_password: ''
      host_name: ''
      dns_servers: ''
      authorized_ssh_keys: ''
      nic_name: ''
      nic_boot_protocol: ''
      nic_ip_address: ''
      nic_netmask: ''
      nic_gateway: ''
