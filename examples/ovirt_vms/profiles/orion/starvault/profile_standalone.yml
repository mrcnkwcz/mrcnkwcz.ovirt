---
ovirt_vm_profiles:
  starvault:
    count: 1
    cluster: ''
    template: ''
    clone: true
    cpu_sockets: 1
    cpu_cores: 2
    cpu_threads: 1
    memory_max: 16 GiB
    memory: 8 GiB
    memory_guaranteed: 8 GiB
    nics:
      - name: vnic1
        network: ''
    storage_domain: ''
    disk_format: raw
    disks:
      - name: os
        size: 100 GiB
        bootable: true
    lease: ''
    high_availability: true
    high_availability_priority: 50
    affinity_labels:
      - starvault-server
    tags:
      - starvault-server
    cloud_init_persist: true
    cloud_init:
      user_name: ''
      root_password: ''
      host_name: ''
      dns_servers: ''
      authorized_ssh_keys: ''
      nic_name: ''
      nic_boot_protocol: ''
      nic_ip_address: ''
      nic_netmask: ''
      nic_gateway: ''
