name: Linter

on: [push]

jobs:
  setup:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip==22.0.2
          pip install \
          ansible-lint==24.12.2 \
          pylint==3.3.3 \
          yamllint==1.35.1

  pylint:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install pip packages
        run: |
          python -m pip install --upgrade pip==22.0.2
          pip install \
          pylint==3.3.3
      - name: Lint the code with pylint
        run: |
          pylint $(git ls-files '*.py')

  yamllint:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install pip packages
        run: |
          python -m pip install --upgrade pip==22.0.2
          pip install \
          yamllint==1.35.1
      - name: Lint the code with yamllint
        run: |
          yamllint --format=auto $(git ls-files '*.yml')

  ansible-lint:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install pip packages
        run: |
          python -m pip install --upgrade pip==22.0.2
          pip install \
          ansible-lint==24.12.2
      - name: Lint the code with ansible-lint
        run: |
          ansible-lint $(git ls-files '*.yml')
