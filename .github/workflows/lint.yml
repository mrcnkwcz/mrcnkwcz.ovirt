name: Linter

on: [push]

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint yamllint ansible-lint

  pylint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Lint the code with pylint
        run: |
          pylint $(git ls-files '*.py')

  yamllint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Lint the code with yamllint
        run: |
          yamllint --format=auto $(git ls-files '*.yml')

  ansible-lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Lint the code with ansible-lint
        run: |
          ansible-lint $(git ls-files '*.yml')
