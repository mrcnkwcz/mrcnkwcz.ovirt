name: Linter

on: [push]

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

  pylint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install pylint dependencies
        run: |
          pip install pylint
      - name: Lint the code with pylint
        run: |
          pylint $(git ls-files '*.py')

  yamllint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint dependencies
        run: |
          pip install yamllint
      - name: Lint the code with yamllint
        run: |
          yamllint --format=auto $(git ls-files '*.yml')

  ansible-lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-lint dependencies
        run: |
          pip install ansible-lint
      - name: Lint the code with yamllint
        run: |
          ansible-lint $(git ls-files '*.yml')
