name: Linter

on: [push]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Restore cached virtualenv
        uses: actions/cache/restore@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-linter
          path: .venv
      - name: Upgrade pip and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip==22.0.2
          pip install \
          ansible-lint==24.12.2 \
          pylint==3.3.3 \
          yamllint==1.35.1
          echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> $GITHUB_ENV
      - name: Lint the code with pylint
        run: |
          pylint $(git ls-files '*.py')
      - name: Lint the code with yamllint
        run: |
          yamllint --format=auto $(git ls-files '*.yml')
      - name: Lint the code with ansible-lint
        run: |
          ansible-lint $(git ls-files '*.yml')
      - name: Saved cached virtualenv
        uses: actions/cache/save@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup_python.outputs.python-version }}-linter
          path: .venv
          


